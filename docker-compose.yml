services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bandeirantes-backend
    ports:
      - "8100:8100"
    volumes:
      - dashboard-db:/app/database
      - ./receitas:/app/receitas:ro
      - ./despesas:/app/despesas:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8100
    container_name: bandeirantes-frontend
    depends_on:
      - backend
    ports:
      - "3100:3100"
    restart: unless-stopped

volumes:
  dashboard-db: