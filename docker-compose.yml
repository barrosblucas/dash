services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bandeirantes-backend
    ports:
      - "8100:8000"
    volumes:
      - dashboard-db:/app/database
      - ./receitas:/app/receitas:ro
      - ./despesas:/app/despesas
    networks:
      - default
      - caddy-proxy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://dashboard.bandeirantesms.app.br
    container_name: bandeirantes-frontend
    depends_on:
      - backend
    ports:
      - "3100:3000"
    networks:
      - default
      - caddy-proxy
    restart: unless-stopped

volumes:
  dashboard-db:

networks:
  caddy-proxy:
    external: true
    name: caddy-proxy